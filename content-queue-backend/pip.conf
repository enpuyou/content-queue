[global]
# Pull PyTorch CPU-only wheels from the official PyTorch wheel index.
# This ensures torch/torchvision install with CPU-only builds on Linux servers
# (no CUDA required). The ABI tags on PyPI's torch wheels target GPU-enabled
# environments; the CPU index has compatible wheels for standard glibc Linux.
extra-index-url = https://download.pytorch.org/whl/cpu

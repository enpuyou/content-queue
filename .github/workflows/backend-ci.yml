name: Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 2.0.1
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: content-queue-backend/.venv
        key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      working-directory: ./content-queue-backend
      run: poetry install --no-interaction --no-root

    - name: Install dependencies (including dev)
      working-directory: ./content-queue-backend
      run: poetry install --with dev

    - name: Run Black (code formatting check)
      working-directory: ./content-queue-backend
      run: poetry run black --check app/

    - name: Run Ruff (linting)
      working-directory: ./content-queue-backend
      run: poetry run ruff check app/

    - name: Set up PostgreSQL with pgvector
      run: |
        docker run -d \
          --name postgres-pgvector \
          -e POSTGRES_USER=postgres \
          -e POSTGRES_PASSWORD=postgres \
          -e POSTGRES_DB=content_queue_test \
          -p 5432:5432 \
          pgvector/pgvector:pg16
        # Wait for PostgreSQL to be ready
        for i in {1..30}; do
          if docker exec postgres-pgvector pg_isready -U postgres; then
            break
          fi
          echo "Waiting for PostgreSQL..."
          sleep 1
        done

    - name: Enable pgvector extension
      run: |
        docker exec postgres-pgvector psql -U postgres -d content_queue_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

    - name: Run tests
      working-directory: ./content-queue-backend
      run: poetry run pytest tests/ -v --tb=short
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/content_queue_test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/content_queue_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key-for-ci
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
